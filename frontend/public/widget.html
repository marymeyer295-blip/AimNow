<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mock Website Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    /* basic reset & style for the floating widget */
    body { font-family: sans-serif; background: #e5e7eb; }
    #widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Confirmation card bubble gets a distinct look */
    .confirmation-card {
      background: #f0fdf4 !important;
      border: 1.5px solid #22c55e !important;
      color: #166534 !important;
      font-size: 0.82rem !important;
      white-space: pre-line;
      line-height: 1.6;
    }
    .confirmation-card strong { font-weight: 700; }
    /* Normal AI bubble line-break support */
    .ai-bubble { white-space: pre-line; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="p-10 text-center">
    <h1 class="text-3xl font-bold mb-4">Sample Client Website</h1>
    <p>This page represents your public-facing website. The widget in the bottom right acts as the "Website Visitor Chat Widget".</p>
  </div>

  <div id="widget">
    <!-- Header -->
    <div class="bg-green-500 text-white p-4 flex justify-between items-center shadow-md z-10">
      <h2 class="font-bold">AIM Assistant</h2>
      <span class="text-xs opacity-75">Online</span>
    </div>

    <!-- Chat Log -->
    <div id="chat-log" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 flex flex-col">
      <div class="max-w-[80%] bg-gray-200 text-gray-800 self-start mr-auto p-3 text-sm rounded-xl rounded-bl-none">
        Welcome to AIM! How can we help you today?
      </div>
    </div>

    <!-- Input -->
    <div class="p-3 bg-white border-t flex gap-2 w-full">
      <input type="text" id="chat-input" class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()"/>
      <button onclick="sendMessage()" class="bg-green-500 text-white rounded-full flex-shrink-0 w-10 h-10 flex items-center justify-center hover:bg-green-600 transition">
        <svg xmlns="http://www.0000.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
      </button>
    </div>
  </div>

  <script>
    let sessionId = null;
    let socket = null;

    /**
     * Render a chat bubble.
     * @param {string} msg     Raw text (may contain \n and **bold**)
     * @param {string} source  'user' | 'ai' | 'system'
     * @param {boolean} isCard Show as a confirmation card (green border)
     */
    function renderMessage(msg, source, isCard = false) {
      if (!msg) return;
      const chatLog = document.getElementById('chat-log');
      const div = document.createElement('div');

      // Convert **text** → <strong>text</strong>, keep newlines
      const safeHtml = msg
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      if (source === 'user') {
        div.className = 'max-w-[85%] rounded-xl p-3 text-sm bg-green-500 text-white self-end ml-auto rounded-br-none';
      } else if (isCard) {
        div.className = 'max-w-[90%] rounded-xl p-3 text-sm self-start mr-auto rounded-bl-none confirmation-card';
      } else {
        div.className = 'max-w-[85%] rounded-xl p-3 text-sm bg-gray-200 text-gray-800 self-start mr-auto rounded-bl-none ai-bubble';
      }

      div.innerHTML = safeHtml;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function initSocket() {
      if (socket) return;
      socket = io('http://localhost:3000');
      socket.on(`chat_update_${sessionId}`, (data) => {
        // Only render admin override messages via socket now to prevent duplicates with HTTP response
        if (data.source === 'admin') {
          renderMessage(data.message, data.source);
        }
      });
      }
    

    function showTyping() {
      const chatLog = document.getElementById('chat-log');
      const div = document.createElement('div');
      div.id = 'typing-indicator';
      div.className = 'max-w-[80%] rounded-xl p-3 text-sm bg-gray-200 text-gray-800 self-start mr-auto rounded-bl-none flex items-center gap-1';
      div.innerHTML = `
        <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-duration: 0.8s;"></div>
        <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-duration: 0.8s; animation-delay: 0.2s;"></div>
        <div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style="animation-duration: 0.8s; animation-delay: 0.4s;"></div>
      `;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function hideTyping() {
      const indicator = document.getElementById('typing-indicator');
      if (indicator) indicator.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message) return;

      renderMessage(message, 'user');
      input.value = '';
      
      showTyping();

      try {
        const response = await fetch('http://localhost:3000/api/chatbot/public/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId })
        });
        
        const data = await response.json();
        hideTyping();
        
        if (!sessionId && data.sessionId) {
          sessionId = data.sessionId;
          initSocket();
        }

        if (data.nextQuestion && data.nextQuestion.question_text) {
          const isCard = data.nextQuestion.type === 'confirmation_card';
          renderMessage(data.nextQuestion.question_text, 'ai', isCard);
        } else if (data.nextQuestion && typeof data.nextQuestion === 'string') {
          renderMessage(data.nextQuestion, 'ai');
        }

      } catch (err) {
        hideTyping();
        console.error('Failed to send message', err);
        renderMessage('Error communicating with server.', 'system');
      }
    }
  </script>
</body>
</html>
